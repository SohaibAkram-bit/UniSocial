<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSocial - UOL Student Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <header>
        <h1>UniSocial</h1>
        <div id="auth-buttons">
            <button id="btn-show-login">Login</button>
            <button id="btn-show-signup">Sign Up</button>
            <button id="btn-logout" class="hidden">Logout</button>
        </div>
    </header>

    <main>
        <!-- Auth Modals/Sections (Hidden by default, toggled by JS) -->
        <section id="auth-section" class="hidden">
            <!-- Login Form -->
            <div id="login-box" class="hidden auth-box">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="UOL Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p id="login-error" class="error-text"></p>
            </div>

            <!-- Signup Form -->
            <div id="signup-box" class="hidden auth-box">
                <h2>Sign Up</h2>
                <form id="signup-form">
                    <input type="text" id="signup-firstname" placeholder="First Name" required>
                    <input type="email" id="signup-email" placeholder="UOL Email (@student.uol.edu.pk)" required>
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <button type="submit">Sign Up</button>
                </form>
                <p id="signup-error" class="error-text"></p>
            </div>
        </section>

        <!-- Create Post Section -->
        <section id="create-post-section" class="hidden">
            <h2>Speak Your Mind</h2>
            <form id="create-post-form">
                <textarea id="post-text" placeholder="What's on your mind? (Academic, Rant, Advice...)" required></textarea>
                <div class="post-controls">
                    <select id="post-category" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Academic">Academic</option>
                        <option value="Mental Health">Mental Health</option>
                        <option value="Social">Social</option>
                        <option value="Rant">Rant</option>
                        <option value="Advice">Advice</option>
                    </select>
                    <label>
                        <input type="checkbox" id="post-anonymous"> Post Anonymously
                    </label>
                    <button type="submit">Post</button>
                </div>
            </form>
            <p id="post-error" class="error-text"></p>
        </section>

        <!-- Feed Section -->
        <section id="feed-section">
            <h2>Recent Posts</h2>
            <div id="posts-container">
                <!-- Posts will be dynamically injected here by app.js -->
                <p>Loading posts...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
